# 단일 VPS(Vultr) self-host 앱 스택(postgres·api·web). 외부 공개 포트 없음(인바운드 0).
# cloudflared 는 이 스택에 두지 않고 별도 compose(docker-compose.cloudflared.yml)로 분리 운영한다 —
# 앱 재배포·중단·크래시와 무관하게 터널·SSH 가 유지된다. 두 스택은 외부 네트워크 daeoebi-net 을 공유한다(DEPLOY.md).
#
# 사전 준비:  docker network create daeoebi-net (1회)  &&  cp apps/api/.env.example apps/api/.env.production  &&  [운영 환경] 블록 값 채우기
# 실행(권장): make prod-deploy     (CI 가 GHCR 에 올린 이미지를 pull 해 기동 — 서버에서 빌드 안 함)
# 실행(폴백): make prod-up         (= docker compose --env-file apps/api/.env.production up -d --build, 서버에서 직접 빌드)
# 갱신:       git pull && make prod-deploy
# 주의:       직접 docker compose 를 쓸 땐 --env-file apps/api/.env.production 을 반드시 붙인다(${} 치환 출처).
name: daeoebi

services:
    postgres:
        image: postgres:17-alpine
        container_name: daeoebi-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-secrets}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?apps/api/.env.production 에 POSTGRES_PASSWORD 를 설정하세요(make prod-up 은 --env-file 로 읽음)}
            POSTGRES_DB: ${POSTGRES_DB:-daeoebi}
        # 공개 포트 없음. 내부 도커 네트워크로만 접근한다.
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-secrets} -d ${POSTGRES_DB:-daeoebi}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    api:
        # 기본은 CI(GitHub Actions)가 GHCR 에 올린 이미지를 pull 해 쓴다(make prod-deploy).
        # build 블록은 서버에서 직접 빌드하는 폴백 경로(make prod-up)로 남겨둔다.
        image: ${API_IMAGE:-ghcr.io/leejw951208/daeoebi-api:latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: api
        container_name: daeoebi-api
        restart: unless-stopped
        # 운영 설정은 apps/api/.env.production 한 파일에서 주입한다(개발은 같은 .env.example 의 .env.development).
        # 파일 전체 키가 컨테이너 환경변수로 주입되고, 앱은 process.env 만 읽는다.
        # 필수 키: DATABASE_URL, HOST, PORT, API_GLOBAL_PREFIX, TRUST_PROXY, COOKIE_SECURE,
        #          WEBAUTHN_RP_ID, WEBAUTHN_RP_NAME, VAULT_ALLOWED_ORIGINS, CORS_ORIGIN, BOOTSTRAP_TOKEN.
        env_file:
            - apps/api/.env.production
        environment:
            # 컨테이너를 운영 모드로 고정(파일과 무관한 정적값).
            NODE_ENV: production
        depends_on:
            postgres:
                condition: service_healthy
        # 마이그레이션 적용 후 /api 프리픽스로 status 응답을 확인한다.
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://localhost:4000/api/auth/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 40s

    web:
        image: ${WEB_IMAGE:-ghcr.io/leejw951208/daeoebi-web:latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: web
            args:
                # 상대경로 /api → 페이지와 같은 오리진. 호스트 불일치로 인한 쿠키 미전송 문제가 구조적으로 사라진다.
                # NEXT_PUBLIC_* 는 빌드 시점에 인라인되므로 도메인이 바뀌어도 이 값(/api)은 그대로 둔다.
                NEXT_PUBLIC_API_BASE_URL: /api
        container_name: daeoebi-web
        restart: unless-stopped
        depends_on:
            - api

# cloudflared 는 이 스택에 없다 — docker-compose.cloudflared.yml 로 분리(같은 외부 네트워크 daeoebi-net 공유).

networks:
    # 앱·터널 스택이 공유하는 외부 네트워크. 사전에 `docker network create daeoebi-net` 필요.
    default:
        name: daeoebi-net
        external: true

volumes:
    postgres-data:
